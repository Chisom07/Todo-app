<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Todo app</title>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-image"></div>
  
  <div class="container">
    <header class="header">
      <h1 class="title">Todo</h1>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <img src="./images/icon-moon.svg" alt="Dark mode" id="themeIcon">
      </button>
    </header>

    <div class="input-wrapper">
      <div class="checkbox-placeholder"></div>
      <input type="text" class="todo-input" id="todoInput" placeholder="Create a new todo...">
    </div>

    <div class="todo-list-container">
      <div class="todo-list" id="todoList"></div>
      <div class="list-footer" id="listFooter">
        <span class="items-left" id="itemsLeft">0 items left</span>
        <div class="filters" id="desktopFilters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
        <button class="clear-btn" id="clearCompleted">Clear Completed</button>
      </div>
    </div>

    <div class="mobile-filters" id="mobileFilters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <p class="drag-hint">Drag and drop to reorder list</p>

    <div class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
      Coded by <a href="https://github.com/Chisom07">Chisom</a>.
    </div>
  </div>

<script src="script.js"></script>
  
</body>
</html>
